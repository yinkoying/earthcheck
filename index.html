<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>EarthCheck 旅遊綠方程 | 青年百億海外圓夢基金計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Noto Sans TC', sans-serif; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .timeline-line::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #14b8a6, #0d9488);
            left: 24px;
        }
        @media (min-width: 768px) {
            .timeline-line::before {
                left: 50%;
                transform: translateX(-50%);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>;
        const MapPin = (p) => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Calendar = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
        const ArrowLeft = (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
        const Music = (p) => <Icon {...p}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></Icon>;
        const VolumeX = (p) => <Icon {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></Icon>;
        const Play = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
        const ExternalLink = (p) => <Icon {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></Icon>;
        const CheckCircle = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const Leaf = (p) => <Icon {...p}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 5.2 6.1A7 7 0 0 1 11 20z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></Icon>;

        const timelineData = [
            {
                date: "06.20 - 06.22",
                title: { zh: "啟航與澳洲布里斯本初探", en: "Departure & Arrival" },
                desc: { zh: "由台灣啟程抵達布里斯本，進行環境熟悉與團隊建立，準備迎接 EarthCheck 的挑戰。", en: "Departed from Taiwan and arrived in Brisbane. Focused on orientation and team building, getting ready for the EarthCheck journey." },
                highlight: true,
                image: "assets/images/timeline_01.jpg"
            },
            {
                date: "06.23",
                title: { zh: "EarthCheck 總部參訪", en: "Onsite Visit: EarthCheck Office" },
                desc: { zh: "實地走訪 EarthCheck 總部，深入了解機構的發展歷程及其在全球永續旅遊中扮演的關鍵角色。", en: "Visited the EarthCheck Office to understand the organization's history and its critical role in global sustainable tourism." }
            },
            {
                date: "06.24",
                title: { zh: "永續標準與認證基礎", en: "Sustainability Standards and Certification" },
                desc: { zh: "進入核心課程，探討永續基礎、認識標準與認證的全球重要性，並透過實務案例探討認證飯店的旅程，識別適用於自身的產業標準。", en: "Core training on sustainability foundations, the global importance of standards, and practical insights into EarthCheck Certified Hotels." },
                image: "assets/images/timeline_02.jpg"
            },
            {
                date: "06.25",
                title: { zh: "永續管理與風險評估", en: "Sustainable Management & Risk Assessment" },
                desc: { zh: "學習制定永續政策、進行標竿管理與風險評估，並規劃具體的行動方案以達成持續改善。", en: "Learned about sustainability policy making, benchmarking, risk assessment, action planning, and continuous improvement." },
                highlight: true
            },
            {
                date: "06.26",
                title: { zh: "南岸公園實地考察", en: "Onsite Visit: South Bank Parklands" },
                desc: { zh: "前往曾榮獲 Green Flag Award 綠旗認證的南岸公園 (South Bank Parklands)，實地考察城市公園的永續經營與綠色空間管理。", en: "Field visit to South Bank Parklands, a Green Flag Award-winning site, to study sustainable management of urban green spaces." },
                image: "assets/images/timeline_03.jpg"
            },
            {
                date: "06.29 - 06.30",
                title: { zh: "利害關係人溝通與敘事", en: "Communication & Sustainable Storytelling" },
                desc: { zh: "著重於溝通策略，學習如何撰寫並傳達具影響力的永續故事，將理念轉化為實際行動草案。", en: "Focused on stakeholder communication and crafting compelling sustainability stories, translating ideas into action drafts." }
            },
            {
                date: "07.01",
                title: { zh: "羅馬街公園實地考察", en: "Onsite Visit: Roma Street Parklands" },
                desc: { zh: "接續考察布里斯本重要的城市綠肺——羅馬街公園，觀察其生態多樣性與水資源管理策略。", en: "Continued field studies at Roma Street Parklands, observing its biodiversity and water management strategies." },
                image: "assets/images/timeline_04.jpg"
            },
            {
                date: "07.02",
                title: { zh: "永續提案與個人行動計畫", en: "Presentation & Personal Action Plans" },
                desc: { zh: "發表永續故事，並制定個人後續的行動計畫，完成階段性培訓並獲頒證書。", en: "Presented sustainability stories, finalized personal action plans, and received certification for completing the training phase." },
                highlight: true
            },
            {
                date: "07.03 - 07.06",
                title: { zh: "EarthCheck 認證單位深潛", en: "EarthCheck Certified Property Visits" },
                desc: { zh: "密集走訪多間通過 EarthCheck 認證的在地旅宿與物業，檢視理論如何落實於日常營運中。", en: "Intensive visits to EarthCheck Certified properties to see how theory is implemented in daily operations." }
            },
            {
                date: "07.07 - 07.11",
                title: { zh: "成果彙整與賦歸", en: "Reporting, Final Presentation & Return" },
                desc: { zh: "進行報告撰寫與溝通技巧訓練，完成最終成果發表，總結22天的豐碩成果，準備滿載而歸。", en: "Report writing, final presentations, and summarizing the fruitful 22-day journey before returning to Taiwan." },
                highlight: true,
                image: "assets/images/timeline_05.jpg"
            }
        ];

        const App = () => {
            const [lang, setLang] = useState('zh');
            const [isPlaying, setIsPlaying] = useState(false);
            const audioRef = useRef(null);

            const toggleLang = () => setLang(prev => prev === 'zh' ? 'en' : 'zh');

            const toggleAudio = () => {
                if (audioRef.current) {
                    if (isPlaying) {
                        audioRef.current.pause();
                    } else {
                        audioRef.current.play().catch(e => console.log("Audio play blocked by browser:", e));
                    }
                    setIsPlaying(!isPlaying);
                }
            };

            const handleImageError = (e) => {
                e.target.onerror = null;
                const width = e.target.getAttribute('data-w') || '800';
                const height = e.target.getAttribute('data-h') || '600';
                e.target.src = `https://placehold.co/${width}x${height}/f1f5f9/94a3b8?text=Image+Not+Found`;
            };

            const text = {
                zh: {
                    back: "返回主頁",
                    hero_subtitle: "青年百億海外圓夢基金計畫 - 海外翱翔組",
                    hero_title: "旅遊綠方程",
                    hero_desc: "22天的澳洲布里斯本實務見習，深入 EarthCheck 學院，結合資料科學探索永續旅遊與目的地管理的系統化解方。",
                    loc_date: "2026.06.20 - 07.11 | 澳洲 布里斯本",
                    about_title: "關於 EarthCheck",
                    about_desc: "總部位於澳洲布里斯本，EarthCheck 是全球領先的旅遊與目的地科學基準評測、認證及顧問機構。自1987年起，透過嚴謹的科學方法，協助旅遊業在推動觀光發展的同時，亦能妥善管理環境與社會衝擊。",
                    timeline_title: "實務見習歷程",
                    video_title: "紀實影像",
                    gallery_title: "見習剪影",
                    skills_title: "專業能力深化",
                    skills_1: "ESG 基準風險評估 (Benchmarking)",
                    skills_2: "永續政策制定與策略規劃",
                    skills_3: "環境績效指標監測與資料分析",
                    skills_4: "利害關係人溝通與敘事"
                },
                en: {
                    back: "Back to Portfolio",
                    hero_subtitle: "Youth 10 Billion Dreams Fund",
                    hero_title: "Travel Green Equation",
                    hero_desc: "A 22-day practical apprenticeship in Brisbane, Australia, deep diving into EarthCheck Academy to explore systematic solutions for sustainable tourism combined with data science.",
                    loc_date: "Jun 20 - Jul 11, 2026 | Brisbane, Australia",
                    about_title: "About EarthCheck",
                    about_desc: "Headquartered in Brisbane, EarthCheck is the world’s leading scientific benchmarking, certification and advisory group for travel and tourism. Since 1987, they have helped businesses manage their environmental and social impacts.",
                    timeline_title: "Apprenticeship Journey",
                    video_title: "Documentary",
                    gallery_title: "Gallery",
                    skills_title: "Professional Skills Deepened",
                    skills_1: "ESG Benchmarking & Risk Assessment",
                    skills_2: "Sustainability Policy & Strategic Planning",
                    skills_3: "Environmental Performance Monitoring",
                    skills_4: "Stakeholder Communication & Storytelling"
                }
            };

            const t = text[lang];

            return (
                <div className="min-h-screen relative">
                    <nav className="fixed top-0 w-full bg-white/90 backdrop-blur-md shadow-sm z-50 transition-all border-b border-teal-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex justify-between items-center">
                            <a href="https://yinkoying.github.io/portfolio/" className="flex items-center gap-2 text-teal-700 hover:text-teal-900 font-bold transition-colors">
                                <ArrowLeft size={20} />
                                <span className="hidden sm:inline">{t.back}</span>
                            </a>
                            <div className="font-outfit font-bold text-xl tracking-wide text-slate-800 absolute left-1/2 -translate-x-1/2">
                                YIN, KOYING
                            </div>
                            <button onClick={toggleLang} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-teal-50 hover:bg-teal-100 text-teal-800 text-xs font-bold transition-all border border-teal-200">
                                <Globe size={14} />
                                <span>{lang === 'zh' ? 'EN' : '繁中'}</span>
                            </button>
                        </div>
                    </nav>

                    <header className="relative pt-32 pb-20 lg:pt-40 lg:pb-32 overflow-hidden bg-slate-900 text-white min-h-[70vh] flex items-center">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="assets/images/hero_brisbane.jpg" 
                                data-w="1920" data-h="1080"
                                alt="Brisbane" 
                                className="w-full h-full object-cover opacity-40"
                                onError={handleImageError}
                            />
                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/60 to-transparent"></div>
                            <div className="absolute inset-0 bg-teal-900/20 mix-blend-multiply"></div>
                        </div>
                        
                        <div className="max-w-4xl mx-auto px-6 relative z-10 text-center animate-fade-in-up">
                            <div className="inline-flex items-center justify-center gap-2 px-4 py-1.5 rounded-full bg-teal-500/20 border border-teal-400/30 text-teal-300 text-xs font-bold tracking-wider uppercase mb-6 backdrop-blur-sm">
                                <MapPin size={14} />
                                {t.loc_date}
                            </div>
                            <h2 className="text-xl md:text-2xl font-medium text-teal-100 mb-2 tracking-wide">{t.hero_subtitle}</h2>
                            <h1 className="text-5xl md:text-7xl font-black mb-6 tracking-tight text-white drop-shadow-lg">
                                {t.hero_title}
                            </h1>
                            <p className="text-lg md:text-xl text-slate-300 leading-relaxed max-w-2xl mx-auto font-light">
                                {t.hero_desc}
                            </p>
                        </div>
                    </header>

                    <section className="py-16 bg-white relative z-20 -mt-8 rounded-t-3xl border-t border-slate-200 shadow-xl max-w-7xl mx-auto px-4 sm:px-6">
                        <div className="grid md:grid-cols-2 gap-12 items-center">
                            <div>
                                <h3 className="text-sm font-bold text-teal-600 uppercase tracking-widest mb-2 flex items-center gap-2">
                                    <Leaf size={16} /> EarthCheck Academy
                                </h3>
                                <h2 className="text-3xl font-bold text-slate-800 mb-6">{t.about_title}</h2>
                                <p className="text-slate-600 leading-relaxed text-lg mb-8">
                                    {t.about_desc}
                                </p>
                                
                                <h4 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">{t.skills_title}</h4>
                                <ul className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    {[t.skills_1, t.skills_2, t.skills_3, t.skills_4].map((skill, idx) => (
                                        <li key={idx} className="flex items-start gap-2 text-sm text-slate-600 font-medium">
                                            <CheckCircle size={18} className="text-teal-500 shrink-0 mt-0.5" />
                                            {skill}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            <div className="rounded-2xl overflow-hidden shadow-lg border border-slate-100">
                                <img 
                                    src="assets/images/earthcheck_hq.jpg" 
                                    data-w="800" data-h="600"
                                    alt="EarthCheck HQ" 
                                    className="w-full h-full object-cover hover:scale-105 transition-transform duration-700"
                                    onError={handleImageError}
                                />
                            </div>
                        </div>
                    </section>

                    <section className="py-20 bg-slate-50 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-96 h-96 bg-teal-200/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
                        <div className="absolute bottom-0 left-0 w-96 h-96 bg-blue-200/20 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>
                        
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 relative z-10">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-4xl font-black text-slate-800 inline-flex items-center gap-3">
                                    <Calendar size={32} className="text-teal-600" />
                                    {t.timeline_title}
                                </h2>
                            </div>

                            <div className="relative timeline-line py-4">
                                {timelineData.map((item, index) => {
                                    const isLeft = index % 2 === 0;
                                    return (
                                        <div key={index} className={`relative z-10 flex flex-col md:flex-row items-center mb-12 ${isLeft ? 'md:flex-row-reverse' : ''}`}>
                                            <div className="absolute left-[16px] md:left-1/2 w-4 h-4 bg-white border-4 border-teal-500 rounded-full transform -translate-x-1/2 md:top-6 top-1"></div>
                                            
                                            <div className="w-full md:w-1/2 pl-12 md:pl-0 md:px-8">
                                                <div className={`bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all ${item.highlight ? 'border-l-4 border-l-teal-500' : ''}`}>
                                                    <span className="inline-block px-3 py-1 bg-teal-50 text-teal-700 text-xs font-black rounded-md mb-3 tracking-wider">
                                                        {item.date}
                                                    </span>
                                                    <h3 className="text-xl font-bold text-slate-800 mb-3">{item.title[lang]}</h3>
                                                    <p className="text-slate-600 text-sm leading-relaxed">{item.desc[lang]}</p>
                                                    
                                                    {item.image && (
                                                        <div className="mt-4 rounded-xl overflow-hidden bg-slate-100 h-40">
                                                            <img src={item.image} data-w="600" data-h="400" alt={item.title[lang]} className="w-full h-full object-cover" onError={handleImageError} />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="hidden md:block md:w-1/2"></div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </section>

                    <section className="py-20 bg-slate-900 text-white">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl md:text-4xl font-black text-white">{t.video_title}</h2>
                                <div className="w-16 h-1 bg-teal-500 mx-auto mt-4 rounded-full"></div>
                            </div>
                            
                            <div className="relative max-w-4xl mx-auto rounded-2xl overflow-hidden shadow-2xl aspect-video bg-slate-800 border border-slate-700 group cursor-pointer">
                                <video 
                                    controls 
                                    poster="assets/images/video_poster.jpg" 
                                    className="w-full h-full object-cover"
                                    onError={(e) => {
                                        e.target.outerHTML = `<div class="w-full h-full flex flex-col items-center justify-center bg-slate-800 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-4 opacity-50"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg><p class="text-sm font-medium">Video Coming Soon</p></div>`;
                                    }}
                                >
                                    <source src="assets/videos/brisbane_vlog.mp4" type="video/mp4" />
                                </video>
                            </div>
                        </div>
                    </section>

                    <section className="py-20 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl md:text-4xl font-black text-slate-800">{t.gallery_title}</h2>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[1, 2, 3, 4].map((num) => (
                                    <div key={num} className="aspect-square rounded-xl overflow-hidden bg-slate-100 border border-slate-100">
                                        <img 
                                            src={`assets/images/gallery_${num}.jpg`} 
                                            data-w="400" data-h="400"
                                            alt={`Gallery ${num}`} 
                                            className="w-full h-full object-cover hover:scale-110 transition-transform duration-500"
                                            onError={handleImageError}
                                        />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer className="bg-slate-50 py-10 border-t border-slate-200 text-center">
                        <div className="font-outfit font-black text-xl text-teal-900 mb-2">YIN, KOYING</div>
                        <p className="text-xs text-slate-500 font-medium uppercase tracking-wider">AI x ESG Solutions</p>
                    </footer>

                    <button 
                        onClick={toggleAudio} 
                        className="fixed bottom-6 right-6 p-4 bg-white shadow-lg rounded-full border border-slate-200 text-teal-600 hover:bg-teal-50 transition-all z-50 focus:outline-none"
                        title="Toggle Background Music"
                    >
                        {isPlaying ? <Music size={20} className="animate-pulse" /> : <VolumeX size={20} />}
                    </button>
                    
                    <audio ref={audioRef} loop>
                        <source src="assets/audio/ambient_nature.mp3" type="audio/mpeg" />
                    </audio>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
